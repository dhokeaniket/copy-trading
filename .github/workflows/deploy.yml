name: Deploy Ascentra Capital Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          command_timeout: 20m
          script: |
            cd /home/ec2-user/copy-trading
            git stash || true
            git checkout -- . || true
            git pull origin main
            chmod +x gradlew scripts/start-backend.sh 2>/dev/null || true
            export JAVA_HOME=/usr/lib/jvm/java-21-openjdk
            export PATH=$JAVA_HOME/bin:$PATH
            # Stop duplicate starters (systemd/manual) before build
            sudo fuser -k 8081/tcp 2>/dev/null || true
            killall java 2>/dev/null || true
            sleep 5
            ./gradlew clean build -x test --no-daemon
            if [[ -x scripts/start-backend.sh ]]; then
              bash scripts/start-backend.sh
            else
              source /home/ec2-user/.bashrc 2>/dev/null || true
              nohup java -Xmx512m -jar build/libs/copy-trading-backend-0.1.0.jar >> /home/ec2-user/ascentra.log 2>&1 &
            fi
            sleep 45
            curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:8081/api/v1/brokers || echo "App starting..."
            echo "Deployment successful!"
