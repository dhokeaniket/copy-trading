name: Deploy Ascentra Capital Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          command_timeout: 20m
          script: |
            cd /home/ec2-user/copy-trading
            git stash || true
            git checkout -- . || true
            rm -f gradle.properties
            git pull origin main
            chmod +x gradlew
            export JAVA_HOME=/usr/lib/jvm/java-21-openjdk
            export PATH=$JAVA_HOME/bin:$PATH
            ./gradlew build -x test --no-daemon
            fuser -k 8081/tcp || true
            sleep 2
            nohup java -Xmx512m -jar build/libs/copy-trading-backend-0.1.0.jar > /home/ec2-user/ascentra.log 2>&1 &
            disown
            sleep 15
            curl -s http://localhost:8081/health || echo "App starting..."
            echo "Deployment successful!"
