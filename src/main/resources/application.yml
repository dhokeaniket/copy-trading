server:
  port: ${PORT:8081}
  address: 0.0.0.0

app:
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  application:
    name: copy-trading-backend
  r2dbc:
    url: r2dbc:postgresql://127.0.0.1:5432/copytrading
    username: postgres
    password: Password
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: copy-trading-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            use:
              type:
                headers: true
            value:
              default:
                type: com.copytrading.replication.TradeEvent
            trusted:
              packages: com.copytrading.replication
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  issuer: copy-trading
  secret: ${JWT_SECRET:change-me}
  accessTokenExpirationSeconds: 900
  refreshTokenExpirationSeconds: 604800

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs
  api-docs:
    path: /v3/api-docs
  use-management-port: false

brokers:
  zerodha:
    apiKey: ${ZERODHA_API_KEY:dm1fk4i61xyi29iu}
    apiSecret: ${ZERODHA_API_SECRET:3eqyt7lsvr5sz90c5yabf63x930ihph9}
  fyers:
    apiKey: ${FYERS_API_KEY:X3OX66WB1J-100}
    apiSecret: ${FYERS_API_SECRET:SQNAPQKU7M}
  upstox:
    apiKey: ${UPSTOX_API_KEY:c7282c93-6b03-4865-8cee-38f2912ea648}
    apiSecret: ${UPSTOX_API_SECRET:dyc5vwazlr}
  callbackUrl: ${BROKER_CALLBACK_URL:https://copy-trading-production-3981.up.railway.app/api/v1/brokers/callback}
