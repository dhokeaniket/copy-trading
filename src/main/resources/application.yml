server:
  port: ${PORT:8081}
  address: 0.0.0.0

app:
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}

# Master order polling — copy detection latency (fixedDelay between cycles)
engine:
  polling:
    interval-ms: ${ENGINE_POLLING_INTERVAL_MS:500}
    initial-delay-ms: ${ENGINE_POLLING_INITIAL_DELAY_MS:15000}

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  application:
    name: copy-trading-backend
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://database-1.clysagkw8b8t.eu-north-1.rds.amazonaws.com:5432/copytrading?sslMode=require}
    username: ${SPRING_R2DBC_USERNAME:postgres}
    password: ${SPRING_R2DBC_PASSWORD:Ascentra123}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: copy-trading-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            use:
              type:
                headers: true
            value:
              default:
                type: com.copytrading.replication.TradeEvent
            trusted:
              packages: com.copytrading.replication
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

jwt:
  issuer: copy-trading
  secret: ${JWT_SECRET:change-me}
  accessTokenExpirationSeconds: 900
  refreshTokenExpirationSeconds: 604800

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs
  api-docs:
    path: /v3/api-docs
  use-management-port: false

logging:
  level:
    com.copytrading.broker: INFO
    com.copytrading.notification: INFO
    com.copytrading.auth: INFO
    com.copytrading.engine: INFO

aws:
  accessKeyId: ${AWS_ACCESS_KEY_ID:}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY:}
  region: ${AWS_REGION:ap-south-1}
  sns:
    topicArn: ${AWS_SNS_TOPIC_ARN:}
    smsType: ${AWS_SNS_SMS_TYPE:Transactional}
    # Leave empty unless Sender ID is registered (required for India DLT). Unregistered IDs block SMS.
    senderId: ${AWS_SNS_SENDER_ID:}

telegram:
  # Set on EC2 via env — never commit real tokens. Revoke token if exposed in chat/logs.
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:Copy_tradingsBot}
  enabled: ${TELEGRAM_ENABLED:false}
  # Public HTTPS URL for setWebhook (e.g. https://api.ascentracapital.com/api/v1/telegram/webhook)
  webhook-base-url: ${TELEGRAM_WEBHOOK_BASE_URL:}

